name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Version pinned via root package.json `packageManager` field —
      # pnpm/action-setup rejects specifying both. Keeping packageManager
      # makes corepack the source of truth across CI + dev machines.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build shared first so workspace consumers (adapter, responder) can
      # resolve `@d1dx/paperclip-human-bridge-shared` types via dist/.
      # `pnpm -r build` follows the workspace dep graph topologically.
      - run: pnpm -r build

      - run: pnpm typecheck

      - run: pnpm test --if-present
