# Example docker-compose for the responder.
# Copy, edit, and run with: docker compose --env-file .env up -d

services:
  responder:
    image: ghcr.io/d1dx/paperclip-human-responder:latest
    # Or build locally from the repo root:
    # build:
    #   context: ../
    #   dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      PAPERCLIP_API_URL: ${PAPERCLIP_API_URL}
      GCHAT_AUDIENCE: ${GCHAT_AUDIENCE}
      GCHAT_SERVICE_ACCOUNT_JSON: ${GCHAT_SERVICE_ACCOUNT_JSON}
      RESPONDER_CONFIG: /etc/paperclip-human-bridge/config.yaml
      RESPONDER_DB: /data/thread-state.db
      PORT: 8787
      # Per-agent keys — declare one per agent in your config.yaml:
      PAPERCLIP_AGENT_DANIEL: ${PAPERCLIP_AGENT_DANIEL}
    volumes:
      - ./config.yaml:/etc/paperclip-human-bridge/config.yaml:ro
      - thread-state:/data
    ports:
      - "8787:8787"

volumes:
  thread-state:
